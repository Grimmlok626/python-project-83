{% extends "base.html" %}
{% block content %}
<h2>Добавить сайт</h2>
<form method="post" class="form" novalidate>
    <div class="mb-3">
        <label for="url" class="form-label">URL сайта</label>
        <input 
            type="url" 
            class="form-control" 
            id="url" 
            name="url" 
            placeholder="Введите URL" 
            value="{{ url|default('') }}" 
            required 
            data-test="url-input"
        />
    </div>
    <button type="submit" class="btn btn-primary">Добавить</button>
</form>
{% endblock %}
